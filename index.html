<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XenograftMaster</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-md app-header sticky-top shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand text-white" href="#/data">
      🧬 XenograftMaster
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" data-route="/data" href="#/data">데이터 관리</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-route="/compare" href="#/compare">비교</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-route="/import" href="#/import">CRO 변환</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-route="/admin" href="#/admin">관리</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Unsaved changes banner (global) -->
<div id="unsavedBanner" class="alert alert-warning d-flex align-items-center gap-2 mb-0 py-2 px-4" style="display:none!important;border-radius:0;">
  <span>⚠ 저장되지 않은 변경사항이 있습니다.</span>
</div>

<!-- Main content -->
<div id="mainContent"></div>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div id="loadingMsg" class="text-secondary fw-bold">불러오는 중...</div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Chart.js Error Bars plugin (for SEM/SD) -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-error-bars@4/build/index.umd.min.js"></script>

<!-- jStat for statistics -->
<script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>

<!-- App modules -->
<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>
<script src="js/utils/analysis.js"></script>
<script src="js/utils/csvParser.js"></script>
<script src="js/views/studyList.js"></script>
<script src="js/views/studyForm.js"></script>
<script src="js/views/studyDetail.js"></script>
<script src="js/views/comparison.js"></script>
<script src="js/views/csvImport.js"></script>
<script src="js/views/adminView.js"></script>

<script>
  // Register routes
  Router.register('/data', () => StudyListView.render());
  Router.register('/study/new', (p) => StudyFormView.render({ id: 'new' }));
  Router.register('/study/:id', (p) => StudyDetailView.render(p));
  Router.register('/study/:id/edit', (p) => StudyFormView.render(p));
  Router.register('/compare', () => ComparisonView.render());
  Router.register('/import', () => CSVImportView.render());
  Router.register('/admin', () => AdminView.render());

  // Make api accessible globally (used in views)
  window.api = api;
  window.analysisState = {};
</script>

</body>
</html>
